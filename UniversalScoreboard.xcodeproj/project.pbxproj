		6F1F9B412F5DFE0600AD89BF /* Copy dSYM Files */ = {
			isa = PBXShellScriptBuildPhase;
			buildActionMask = 2147483647;
			files = (
			);
			inputFileListPaths = (
			);
			inputPaths = (
			);
			name = "Copy dSYM Files";
			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "#!/bin/bash\n\n# Script pour copier les dSYM des frameworks binaires (GoogleMobileAds, UserMessagingPlatform)\n# Ceci évite les warnings \"Upload Symbols Failed\" lors de l'upload App Store\n\necho \"🔍 Searching for dSYM files in DerivedData...\"\n\nDSYM_FOLDER=\"${DWARF_DSYM_FOLDER_PATH}\"\n\n# Cherche les dSYM dans DerivedData\nfind \"${BUILD_DIR}\" -name \"*.dSYM\" -type d | while read -r dsym_path; do\n    framework_name=$(basename \"$dsym_path\" .framework.dSYM)\n    \n    # Si c'est GoogleMobileAds ou UserMessagingPlatform\n    if [[ \"$framework_name\" == \"GoogleMobileAds\" ]] || [[ \"$framework_name\" == \"UserMessagingPlatform\" ]]; then\n        echo \"✅ Found dSYM for $framework_name\"\n        \n        # Copie dans le dossier des dSYM de l'app\n        if [ -d \"$DSYM_FOLDER\" ]; then\n            cp -Rf \"$dsym_path\" \"$DSYM_FOLDER/\"\n            echo \"📦 Copied $framework_name.dSYM to archive\"\n        fi\n    fi\ndone\n\necho \"✅ dSYM copy script completed\"\n";
		};
/* End PBXShellScriptBuildPhase section */

